<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>كشف جنس الجنين - المهمة السرية</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap');
        body { font-family: 'Cairo', sans-serif; }
        .animate-bounce-slow { animation: bounce 3s infinite; }
        @keyframes fade-in { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .stage-enter { animation: fade-in 0.6s ease-out forwards; }
        .confetti { position: absolute; top: -20px; animation: fall linear infinite; }
        @keyframes fall { 0% { transform: translateY(-10vh) rotate(0deg); opacity: 1; } 100% { transform: translateY(110vh) rotate(360deg); opacity: 0; } }
    </style>
</head>
<body class="bg-slate-900 min-h-screen flex items-center justify-center p-4 overflow-hidden">

    <div id="app-container" class="max-w-md w-full bg-white text-slate-900 rounded-[3rem] shadow-2xl overflow-hidden relative border-4 border-slate-800 transition-all duration-700">
        <!-- Progress Bar -->
        <div class="flex h-2 bg-slate-100" id="progress-bar">
            <!-- Progress segments will be injected here -->
        </div>

        <div id="content" class="p-8 sm:p-10 stage-enter">
            <!-- Content will be injected here -->
        </div>
    </div>

    <!-- ملف الصوت المضاف مسبقاً -->
    <audio id="reveal-audio" src="https://files.catbox.moe/73a7vl.mp3" preload="auto"></audio>

    <script>
        let currentStage = 0;
        const totalStages = 10;
        
        const stagesData = [
            { type: 'intro' },
            { type: 'rollcall' },
            { title: "سؤال لـ الغالية أم أحمد 👑", question: "ما هو أول شعور شعرتِ به عندما علمتِ بخبر الحمل؟", type: 'question' },
            { title: "سؤال لـ الحبيبة أم فهد 💖", question: "ما هي النصيحة التي ستقدمينها للأم؟", type: 'question' },
            { title: "سؤال لـ العزيزة أم محمد 🌸", question: "بصفتكِ الخبيرة.. من تتوقعين أن يشبه الطفل أكثر، أباه أم أمه؟", type: 'question' },
            { title: "سؤال لـ الخالات العسولات 🌺", question: "اختارو إسم حسب الموضح: جنى(اسم ولد) وداد (اسم بنت) فاطمة (اسم ولد) كوثر (اسم بنت)", type: 'question' },
            { title: "سؤال لـ ميري 🧹", question: "What do you think the baby is, a ?boy or a girl", type: 'question' },
            { type: 'vault' },
            { type: 'finalpush' },
            { type: 'reveal' }
        ];

        function updateProgressBar() {
            const bar = document.getElementById('progress-bar');
            bar.innerHTML = '';
            for (let i = 0; i < totalStages; i++) {
                const segment = document.createElement('div');
                segment.className = `flex-1 transition-all duration-500 ${currentStage >= i ? (currentStage === 9 ? 'bg-pink-500' : 'bg-indigo-600') : 'bg-transparent'}`;
                bar.appendChild(segment);
            }
        }

        function nextStage() {
            if (currentStage < totalStages - 1) {
                currentStage++;
                render();
            }
        }

        function playRevealSound() {
            const audio = document.getElementById('reveal-audio');
            if (audio) {
                audio.currentTime = 0;
                audio.play().catch(e => console.log("User interaction needed for audio"));
            }
        }

        function render() {
            const content = document.getElementById('content');
            const data = stagesData[currentStage];
            updateProgressBar();
            
            content.classList.remove('stage-enter');
            void content.offsetWidth;
            content.classList.add('stage-enter');

            if (data.type === 'intro') {
                content.innerHTML = `
                    <div class="text-center space-y-8">
                        <div class="bg-slate-100 w-24 h-24 rounded-full flex items-center justify-center mx-auto ring-8 ring-slate-50">
                            <i data-lucide="lock" class="text-slate-800 w-12 h-12"></i>
                        </div>
                        <div class="space-y-4">
                            <h1 class="text-4xl font-black text-slate-900">نظام مشفر 🔐</h1>
                            <p class="text-slate-500 text-lg">أهلاً بكن في "صندوق الأسرار". لن يتم الكشف عن المحتوى إلا بعد اجتياز الاختبارات وتأكيد الحضور.</p>
                        </div>
                        <button onclick="nextStage()" class="w-full bg-slate-900 text-white font-bold py-5 rounded-2xl shadow-xl hover:bg-slate-800 active:scale-95 transition-all">بدء الإجراءات الأمنية</button>
                    </div>
                `;
            } else if (data.type === 'rollcall') {
                const guests = [
                    { id: 'p1', label: 'أم أحمد الغالية' },
                    { id: 'p2', label: 'أم فهد الحبيبة' },
                    { id: 'p3', label: 'أم محمد العزيزة' },
                    { id: 'p4', label: 'الخالات (الأخوات)' },
                    { id: 'p5', label: 'ميري' }
                ];
                let checkedCount = 0;
                content.innerHTML = `
                    <div class="text-center space-y-6">
                        <i data-lucide="users" class="mx-auto text-indigo-600 w-10 h-10"></i>
                        <h2 class="text-2xl font-bold">تأكيد التواجد</h2>
                        <div class="grid gap-3" id="guest-list"></div>
                        <button id="rollcall-btn" disabled class="w-full py-5 rounded-2xl font-bold bg-slate-100 text-slate-300 cursor-not-allowed">استمرار</button>
                    </div>
                `;
                const list = document.getElementById('guest-list');
                guests.forEach(g => {
                    const item = document.createElement('div');
                    item.className = "p-5 rounded-2xl border-2 cursor-pointer transition-all flex items-center justify-between border-slate-100";
                    item.innerHTML = `<span class="font-bold text-lg">${g.label}</span><div class="check-box w-6 h-6 rounded-full border-2 border-slate-200"></div>`;
                    item.onclick = () => {
                        item.classList.toggle('border-indigo-600');
                        item.classList.toggle('bg-indigo-50');
                        const isChecked = item.classList.contains('border-indigo-600');
                        item.querySelector('.check-box').innerHTML = isChecked ? '<i data-lucide="check-circle-2" class="text-indigo-600 w-5 h-5"></i>' : '';
                        checkedCount += isChecked ? 1 : -1;
                        const btn = document.getElementById('rollcall-btn');
                        if (checkedCount === guests.length) {
                            btn.disabled = false;
                            btn.className = "w-full py-5 rounded-2xl font-bold bg-indigo-600 text-white shadow-lg active:scale-95 transition-all";
                            btn.onclick = nextStage;
                        } else {
                            btn.disabled = true;
                            btn.className = "w-full py-5 rounded-2xl font-bold bg-slate-100 text-slate-300 cursor-not-allowed";
                        }
                        lucide.createIcons();
                    };
                    list.appendChild(item);
                });
            } else if (data.type === 'question') {
                content.innerHTML = `
                    <div class="text-center space-y-8">
                        <div class="bg-indigo-100 text-indigo-600 w-16 h-16 rounded-full flex items-center justify-center mx-auto">
                            <i data-lucide="message-circle" class="w-8 h-8"></i>
                        </div>
                        <div class="space-y-4">
                            <h2 class="text-2xl font-black text-indigo-900">${data.title}</h2>
                            <div class="bg-slate-50 p-8 rounded-3xl border-2 border-slate-100 shadow-inner">
                                <p class="text-xl font-medium text-slate-700 italic">"${data.question}"</p>
                            </div>
                        </div>
                        <button id="q-btn" onclick="this.innerHTML='فتح القفل التالي ✨'; this.className='w-full bg-indigo-600 text-white py-5 rounded-2xl font-bold shadow-lg animate-bounce'; this.onclick=nextStage;" class="w-full bg-slate-900 text-white py-5 rounded-2xl font-bold shadow-lg active:scale-95 transition-all">تمت الإجابة (تخطي)</button>
                    </div>
                `;
            } else if (data.type === 'vault') {
                content.innerHTML = `
                    <div class="text-center space-y-8">
                        <h2 class="text-2xl font-bold">لغز الخزنة المشفرة</h2>
                        <p class="text-slate-500 bg-slate-50 p-4 rounded-xl">أدخلي عدد النساء المتواجدات الآن لفك التشفير الأخير</p>
                        <div id="vault-val" class="text-6xl font-black text-indigo-600 h-16 flex items-center justify-center">?</div>
                        <div class="grid grid-cols-3 gap-3 max-w-xs mx-auto" dir="ltr">
                            ${[1,2,3,4,5,6,7,8,9].map(n => `<button onclick="checkVault('${n}')" class="h-14 rounded-xl bg-slate-100 font-bold text-xl hover:bg-indigo-50 active:scale-90 transition-all">${n}</button>`).join('')}
                        </div>
                    </div>
                `;
            } else if (data.type === 'finalpush') {
                let progress = 0;
                content.innerHTML = `
                    <div class="text-center space-y-8">
                        <div class="space-y-2">
                            <h2 class="text-2xl font-bold text-indigo-900">توليد الطاقة النهائية ⚡</h2>
                            <div class="bg-amber-100 text-amber-800 p-3 rounded-xl font-bold animate-pulse text-sm">استعدوا.. بعد هذه المرحلة سيتم الكشف عن جنس الجنين! 🎊</div>
                        </div>
                        <p class="text-slate-500 font-medium">اضغطن معاً 20 مرة وبسرعة قصوى لفتح الصندوق!</p>
                        <div onclick="updateFinalProgress(this)" class="relative w-48 h-48 mx-auto cursor-pointer group select-none active:scale-90 transition-transform">
                            <div class="absolute inset-0 bg-indigo-200 blur-3xl opacity-20"></div>
                            <div class="relative z-10 w-full h-full bg-slate-50 rounded-full border-8 border-slate-100 flex items-center justify-center shadow-xl">
                                <i data-lucide="gift" class="w-20 h-20 text-slate-400"></i>
                            </div>
                            <svg class="absolute inset-0 -rotate-90" viewBox="0 0 100 100">
                                <circle cx="50" cy="50" r="46" fill="none" stroke="#e2e8f0" stroke-width="8" />
                                <circle id="progress-circle" cx="50" cy="50" r="46" fill="none" stroke="#4f46e5" stroke-width="8" stroke-dasharray="289" stroke-dashoffset="289" class="transition-all duration-200" />
                            </svg>
                        </div>
                        <p id="prog-text" class="text-lg font-bold text-indigo-600 animate-pulse">اشحنوا الصندوق بالضغط! 0%</p>
                    </div>
                `;
                window.updateFinalProgress = (el) => {
                    progress += 5; // تم التعديل إلى 5% لكل ضغطة (يعني 20 ضغطة للوصول لـ 100)
                    if (progress >= 100) {
                        progress = 100;
                        setTimeout(nextStage, 300);
                    }
                    document.getElementById('progress-circle').style.strokeDashoffset = 289 - (289 * progress) / 100;
                    document.getElementById('prog-text').innerText = `اشحنوا الصندوق بالضغط! ${progress}%`;
                };
            } else if (data.type === 'reveal') {
                document.getElementById('app-container').className = "max-w-md w-full bg-white text-slate-900 rounded-[3rem] shadow-2xl overflow-hidden relative border-4 border-pink-500 transition-all duration-1000";
                content.innerHTML = `
                    <div class="text-center space-y-10 py-10 bg-gradient-to-b from-pink-50 to-white -m-10 p-10 min-h-[550px] flex flex-col justify-center relative overflow-hidden">
                        <div id="confetti-container"></div>
                        <div class="relative z-10 space-y-6">
                            <div class="inline-block bg-white p-6 rounded-[3rem] shadow-2xl border-b-8 border-pink-100 animate-bounce">
                                <i data-lucide="baby" class="w-24 h-24 text-pink-500"></i>
                            </div>
                            <div class="space-y-4">
                                <h1 class="text-6xl font-black text-transparent bg-clip-text bg-gradient-to-r from-pink-600 to-rose-400 drop-shadow-md leading-tight">إنها بنووووتة! <br> 🎀👧🏻🎀</h1>
                                <p class="text-xl font-bold text-pink-900/50 tracking-widest uppercase">It's a Princess</p>
                            </div>
                            <div class="bg-white/90 backdrop-blur-md p-6 rounded-3xl shadow-xl border border-pink-100 max-w-sm mx-auto">
                                <p class="text-slate-700 leading-relaxed font-medium">ألف مبروك لكل العائلة! ماشاء الله تبارك الله ❤️</p>
                            </div>
                        </div>
                    </div>
                `;
                startConfetti();
                playRevealSound();
            }
            lucide.createIcons();
        }

        window.checkVault = (n) => {
            const display = document.getElementById('vault-val');
            display.innerText = n;
            if (n === '8') {
                setTimeout(nextStage, 600);
            } else {
                setTimeout(() => { display.innerText = '?'; }, 500);
            }
        };

        function startConfetti() {
            const container = document.getElementById('confetti-container');
            const colors = ['#f472b6', '#ec4899', '#db2777', '#fdf2f8', '#fbbf24'];
            for (let i = 0; i < 100; i++) {
                const p = document.createElement('div');
                p.className = 'confetti';
                p.style.left = Math.random() * 100 + '%';
                p.style.width = (Math.random() * 10 + 10) + 'px';
                p.style.height = (Math.random() * 5 + 5) + 'px';
                p.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
                p.style.animationDuration = (Math.random() * 3 + 2) + 's';
                p.style.animationDelay = Math.random() * 2 + 's';
                container.appendChild(p);
            }
        }

        render();
    </script>
</body>
</html>
